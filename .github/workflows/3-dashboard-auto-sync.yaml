name: "3 · Dashboard Auto-Sync"

# When a .prompt.md file is added to platform/ and pushed to main,
# this action detects files not yet referenced in docs/dashboard/workflows.js
# and inserts them into the correct workflow block, then commits back.
#
# Safe: existing entries are never modified or removed.

on:
  push:
    branches: [main]
    paths:
      - "platform/**/*.prompt.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync workflows.js from platform/
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect and add new prompt files
        run: python validations/scripts/sync-dashboard.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dashboard/workflows.js
          if git diff --cached --quiet; then
            echo "workflows.js is already up to date — nothing to commit."
          else
            git commit -m "chore(dashboard): auto-sync workflows.js from platform/ [skip ci]"
            git push
          fi
